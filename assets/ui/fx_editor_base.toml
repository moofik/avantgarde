id = "fx_editor"

[layout]
type = "column"
padding = 0
gap = 0

[[layout.children]]
type = "statusbar"
id = "header_title"
text = "FX EDITOR"
bind = "status.scene.title"
width = "100%"

[[layout.children]]
type = "separator"
id = "sep_top"
height = 1
width = "100%"

[[layout.children]]
type = "fx_editor_view"
id = "fx_view"
height = "auto"
width = "100%"
gap = 1

[[layout.children.children]]
type = "column"
id = "fx_body"
width = "100%"
height = "auto"
gap = 1

[[layout.children]]
type = "separator"
id = "sep_bottom"
height = 1
width = "100%"

[[layout.children]]
type = "text"
id = "action_status"
bind = "status.action"
width = "100%"

[[layout.children]]
type = "text"
id = "keys_hint"
text = " keys [F5/F6 param] [F7/F8 value] [F1 bypass] [esc] "
bind = "status.keys"
width = "100%"
