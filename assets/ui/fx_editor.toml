id = "fx_editor"

[layout]
type = "column"
padding = 0
gap = 0

[[layout.children]]
type = "statusbar"
id = "header_title"
text = "FX EDITOR"
bind = "status.scene.title"
font = "gothic"
font_size = 18
effect = "glitch"
effect_interval_ms = 2000
effect_amount = 0.22
effect_speed = 1.2
width = "100%"

[[layout.children]]
type = "separator"
id = "sep_top"
height = 1
width = "100%"

[[layout.children]]
type = "fx_editor_view"
id = "fx_view"
height = "auto"
width = "100%"
gap = 1

[[layout.children.children]]
type = "text"
id = "fx_meta"
bind = "status.fx.meta"
width = "100%"

[[layout.children.children]]
type = "row"
id = "fx_split"
width = "100%"
gap = 2

[[layout.children.children.children]]
type = "column"
id = "fx_controls_col"
width = "56%"
gap = 1

[[layout.children.children.children.children]]
type = "row"
id = "fx_knobs_row"
width = "100%"
gap = 1

[[layout.children.children.children.children.children]]
type = "knob"
font = "gothic"
font_size = 15
id = "damp"
label = "DAMP"
bind = "scene.fx.param.value.0"
width = "49%"

[[layout.children.children.children.children.children]]
type = "knob"
font = "gothic"
font_size = 15
id = "width"
label = "WIDTH"
bind = "scene.fx.param.value.1"
width = "49%"

[[layout.children.children.children]]
type = "column"
id = "fx_visual_col"
width = "44%"
gap = 1

[[layout.children.children.children.children]]
type = "anim_slot"
id = "fx_anim"
bind = "fx.anim.current"
width = "100%"
height = 8

[[layout.children]]
type = "separator"
id = "sep_bottom"
height = 1
width = "100%"

[[layout.children]]
type = "text"
id = "action_status"
bind = "status.action"
width = "100%"

[[layout.children]]
type = "text"
id = "keys_hint"
text = " keys [F5/F6 param] [F7/F8 value] [F1 bypass] [esc] "
bind = "status.keys"
width = "100%"
