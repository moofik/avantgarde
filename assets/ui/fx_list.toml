id = "fx_list"

[layout]
type = "column"
padding = 0
gap = 0
width = 60
height = 24

[[layout.children]]
type = "statusbar"
id = "header_title"
text = "FX LIST"
bind = "status.scene.title"
font = "gothic"
font_size = 18
effect = "glitch"
effect_interval_ms = 2200
effect_amount = 0.18
effect_speed = 1.0
width = "100%"

[[layout.children]]
type = "separator"
id = "sep_top"
height = 1
width = "100%"

[[layout.children]]
type = "text"
id = "fx_type_status"
text = " quick: F1 edit/add | F7 bypass | F8 remove "
width = "100%"

[[layout.children]]
type = "list"
id = "fx_list"
height = "auto"
width = "100%"

[[layout.children]]
type = "separator"
id = "sep_bottom"
height = 1
width = "100%"

[[layout.children]]
type = "text"
id = "action_status"
bind = "status.action"
width = "100%"

[[layout.children]]
type = "text"
id = "keys_hint"
text = " keys [F5/F6 slot] [F1 apply] [F7 bypass] [F8 remove] [esc] "
bind = "status.keys"
width = "100%"
