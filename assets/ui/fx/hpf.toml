id = "fx_profile_hpf"

[layout]
type = "column"
padding = 0
gap = 1

[[layout.children]]
type = "text"
id = "fx_meta"
bind = "status.fx.meta"
width = "100%"

[[layout.children]]
type = "row"
id = "fx_split"
width = "100%"
gap = 2

[[layout.children.children]]
type = "column"
id = "fx_controls_col"
width = "56%"
gap = 1

[[layout.children.children.children]]
type = "row"
id = "fx_knobs_row"
width = "100%"
gap = 1

[[layout.children.children.children.children]]
type = "knob"
id = "cutoff"
label = "CUTOFF"
bind = "scene.fx.param.value.0"
font = "gothic"
font_size = 15
width = "100%"

[[layout.children.children]]
type = "column"
id = "fx_visual_col"
width = "44%"
gap = 1

[[layout.children.children.children]]
type = "anim_slot"
id = "fx_anim"
width = "100%"
height = 8
bind = "fx.anim.hpf"
